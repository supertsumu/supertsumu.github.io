 <span id="activity-content"></span> <br>

<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003eSnap\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003cp\u003e\u003ca href=\u0022\/\u0022 title=\u0022Home\u0022\u003eHome\u003c\/a\u003e\u003c\/p\u003e\n\u003ch2 id=\u0022streamline---100-points---osint\u0022\u003eStreamline - 100 points - OSINT\u003c\/h2\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/snap.png\u0022 alt=\u0022drawing\u0022 width=\u0022400\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eThere weren\u0026rsquo;t many hints from this challenge other than it suggesting that the challenge remains on Instagram. Since the previous challenge is Instagram related, I took a look back at the challenge profiles and noticed that some of the profile images look very strange. Using \u003ca href=\u0022https:\/\/toolzu.com\/downloader\/instagram\/instadp\/\u0022\u003eToolzu\u0026rsquo;s Instadp\u003c\/a\u003e, I was able to download the profile pictures from the previous challenge. Piecing them together gives us this full image:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/pieced.png\u0022 alt=\u0022drawing\u0022 width=\u0022550\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eAfter some confirmation from the admins, the goal is to find the location of where this image was taken from. I sighted multiple clues that led me to thinking that this is in Malaysia. The most obvious being the navy \u0026amp; white building behind the brown one on the right is very similar to the ones seen in Malaysian police stations. The cars on the roads are also very common in Malaysia. After looking up some Malaysian trains, the one in the image looks very similar to the ones seen in the KL monorail mainly because of the stripe on the top of the train and the shape of the train. But the most obvious giveaway of the approximate location of the image can be found at the dome structure to the right of the image. Searching \u0026ldquo;domed structures in Malaysia\u0026rdquo; will give you a hard time finding that specific building in the image because of the multitude of domed mosques in the country so I made a guess and looked for \u0026ldquo;domed stadiums in Malaysia\u0026rdquo; and found Stadium Negara which matches the color and rough nature of the roof:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/stadium.png\u0022 alt=\u0022drawing\u0022 width=\u0022800\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eNow, we have to find the exact location where the image was taken. According to the image, the camera seems to be floating next to a monorail near a station. I mapped out some stations near the stadium and started guessing the station name as the flag:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/googlemaps.png\u0022 alt=\u0022drawing\u0022 width=\u0022800\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003e\u003cstrong\u003eFlag: BO1337{Imbi}\u003c\/strong\u003e\u003c\/p\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
