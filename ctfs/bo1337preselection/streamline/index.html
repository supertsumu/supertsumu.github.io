</head><body><div id="content">
    
    
    


    <span id="activity-title"></span> <br>
 <span id="activity-content"></span> <br>

<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003eStreamline\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003cp\u003e\u003ca href=\u0022\/\u0022 title=\u0022Home\u0022\u003eHome\u003c\/a\u003e\u003c\/p\u003e\n\u003ch2 id=\u0022streamline---176-points---networking\u0022\u003eStreamline - 176 points - Networking\u003c\/h2\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/streamline.png\u0022 alt=\u0022drawing\u0022 width=\u0022400\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eWe are given an image file, this time named LamboRidzuan:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/lamboridzuan.png\u0022 alt=\u0022drawing\u0022 width=\u0022400\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eUsing \u003ca href=\u0022https:\/\/github.com\/RickdeJager\/stegseek\u0022\u003estegseek\u003c\/a\u003e, I am able to bruteforce a hidden file using rockyou.txt.\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/stegseek.png\u0022 alt=\u0022drawing\u0022 width=\u0022600\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eI renamed it to its original file name of handshake.cap and opened it with wireshark. Looking at the protocol hierarchy of the packets, we do not have a lot to look at:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/datahierarchy.png\u0022 alt=\u0022drawing\u0022 width=\u0022800\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eThis is because the data has been encrypted. We can search for the handshake by inserting \u0026ldquo;eapol\u0026rdquo; into the filter bar:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/eapol.png\u0022 alt=\u0022drawing\u0022 width=\u0022800\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eTo extract the handshakes, we can use the hcxpcapngtool on the capture file:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/extracthandshake.png\u0022 alt=\u0022drawing\u0022 width=\u0022400\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eNow that we have Ridzuan\u0026rsquo;s handshake, we can try to crack his wifi password. Using \u003ca href=\u0022https:\/\/github.com\/sc0tfree\/mentalist\u0022\u003eMentalist\u003c\/a\u003e, I created multiple wordlists in the format of 4 alphabets and 4 numbers separated by a symbol. I cracked the handshake using hashcat and the wordlists:\u003c\/p\u003e\n\u003ccenter\u003e\n\u003cimg src=\u0022\/crackhandshake.png\u0022 alt=\u0022drawing\u0022 width=\u0022400\u0022\/\u003e\u003cbr \/\u003e\n\u003c\/center\u003e\n\u003cp\u003eI managed to get the password oyen@9367 which was the flag for the challenge.\u003c\/p\u003e\n\u003cp\u003e\u003cstrong\u003eFlag: oyen@9367\u003c\/strong\u003e\u003c\/p\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
